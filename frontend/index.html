<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060a" />
    <meta
      name="description"
      content="Catafract — Software factory que construye productos, automatizaciones y plataformas para empresas que quieren operar, vender y escalar."
    />
    <link rel="canonical" href="https://catafract.com/" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Catafract" />
    <meta property="og:url" content="https://catafract.com/" />
    <meta property="og:title" content="Catafract — Software factory para empresas modernas" />
    <meta
      property="og:description"
      content="Construimos software que ayuda a empresas a operar, vender y escalar: productos, automatizaciones y plataformas, en un solo equipo."
    />
    <meta property="og:image" content="https://catafract.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catafract — Software factory para empresas modernas" />
    <meta
      name="twitter:description"
      content="Construimos software que ayuda a empresas a operar, vender y escalar: productos, automatizaciones y plataformas, en un solo equipo."
    />
    <meta name="twitter:image" content="https://catafract.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Catafract — Software factory para empresas modernas</title>
    <script>
      // Anti-flash: aplica el tema antes de que React monte
      (function () {
        try {
          var stored = localStorage.getItem('catafract-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
